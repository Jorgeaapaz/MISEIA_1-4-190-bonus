name: CI/CD — Test, Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test
        env:
          JWT_SECRET: test-secret-32-chars-minimum-ok!!

  deploy:
    name: Build Docker image & Deploy to GCP VM
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Write production env file
        run: echo "${{ secrets.ENV_PRODUCTION }}" > .env.production

      - name: Build Docker image
        run: docker build --build-arg NODE_ENV=production -t bondvault:${{ github.sha }} .

      - name: Save Docker image
        run: docker save bondvault:${{ github.sha }} | gzip > bondvault.tar.gz

      - name: Copy image and env to VM
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "mkdir -p ~/MISEIA1-4-190-bonus_bondvault"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            bondvault.tar.gz .env.production \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/MISEIA1-4-190-bonus_bondvault/

      - name: Deploy container on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
          set -e
          cd ~/MISEIA1-4-190-bonus_bondvault
          docker load < bondvault.tar.gz
          docker stop bondvault 2>/dev/null || true
          docker rm   bondvault 2>/dev/null || true
          docker run -d \
            --name bondvault \
            --network miseia-net \
            --env-file .env.production \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.bondvault.rule=Host(\`bondvault.deviaaps.com\`)" \
            --label "traefik.http.routers.bondvault.entrypoints=websecure" \
            --label "traefik.http.routers.bondvault.tls=true" \
            --label "traefik.http.routers.bondvault.tls.certresolver=cloudflare" \
            --label "traefik.http.services.bondvault-svc.loadbalancer.server.port=3000" \
            --label "traefik.docker.network=miseia-net" \
            --restart unless-stopped \
            bondvault:${{ github.sha }}
          docker image prune -f
          ENDSSH
